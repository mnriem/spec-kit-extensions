name: Release Extension

on:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract extension id (everything before the last -vX.Y.Z)
          EXTENSION_ID="${TAG%-v*}"
          VERSION="${TAG#*-v}"

          # Validate version format
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '$VERSION'" >&2
            exit 1
          fi

          # Validate extension directory exists
          if [[ ! -d "$EXTENSION_ID" ]]; then
            echo "Error: Extension directory '$EXTENSION_ID' not found" >&2
            exit 1
          fi

          # Validate extension.yml exists
          if [[ ! -f "$EXTENSION_ID/extension.yml" ]]; then
            echo "Error: $EXTENSION_ID/extension.yml not found" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "extension_id=$EXTENSION_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $EXTENSION_ID v$VERSION"

      - name: Create extension zip
        run: |
          cd "${{ steps.parse.outputs.extension_id }}"
          zip -r "../${{ steps.parse.outputs.extension_id }}.zip" . \
            -x '.*' '__pycache__/*'

      - name: Generate release notes
        id: notes
        run: |
          EXTENSION_ID="${{ steps.parse.outputs.extension_id }}"
          VERSION="${{ steps.parse.outputs.version }}"
          CHANGELOG="$EXTENSION_ID/CHANGELOG.md"

          {
            echo 'body<<EOF'
            if [[ -f "$CHANGELOG" ]]; then
              # Extract the section for this version from CHANGELOG.md
              awk -v ver="$VERSION" '
                /^## \[/ {
                  if (found) exit
                  if (index($0, ver)) found=1
                }
                found { print }
              ' "$CHANGELOG"
            else
              echo "Release $EXTENSION_ID v$VERSION"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXTENSION_ID="${{ steps.parse.outputs.extension_id }}"
          TAG="${{ steps.parse.outputs.tag }}"
          VERSION="${{ steps.parse.outputs.version }}"

          gh release create "$TAG" \
            "$EXTENSION_ID.zip" \
            --title "$EXTENSION_ID v$VERSION" \
            --notes "${{ steps.notes.outputs.body }}"
